services:
  router:
    build:
      context: .
    image: wtf-mcp-router:latest
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      VECTOR_DB_URL: ${VECTOR_DB_URL:-http://qdrant:6333}
      ROUTER_API_KEY_FILE: ${ROUTER_API_KEY_FILE:-/run/secrets/router_api_key}
    secrets:
      - router_api_key
    depends_on:
      vector-db:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "node scripts/router-healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  vector-db:
    image: qdrant/qdrant:v1.7.3
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  qdrant-data:

secrets:
  router_api_key:
    file: ./secrets/router_api_key.txt
